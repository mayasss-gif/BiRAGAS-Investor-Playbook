const sections = [
  {
    "id": "hook",
    "label": "The Hook",
    "subtitle": "Open with the wound, not the solution",
    "color": "#C8102E",
    "content": {
      "headline": "Nine Out of Ten Drugs Fail.",
      "body": "Every major drug that washes out in late-stage trials costs the sponsor an average of two billion dollars and a decade of work. The dirty secret of pharmaceutical R&D is that most of those failures aren't random. They are predictable. The wrong biological target was chosen at the very start — based on correlation data dressed up as causation.\n\nThe industry has known this for years. It just hasn't had a tool that fixes it.\n\nDon't lead with the technology. Lead with the pain. Every investor who has touched pharma knows the failure rate is catastrophic — about ninety percent of drugs that enter clinical trials never reach patients. You're not pitching a product. You're pitching the antidote to the most expensive problem in all of science.",

  {

      "headline": "Correlation Is Not a Business Strategy.",
      "body": "The entire biomedical research infrastructure — sequencing platforms, expression profiling, genome-wide association studies — generates association data. It tells you that gene A and gene B move together in disease. It cannot tell you which one is the driver and which is the passenger.\n\nThat distinction is worth billions. A drug that targets a passenger gene will never work, no matter how well it's designed. And the FDA is getting stricter — they now require mechanistic, causal evidence to support therapeutic claims, not just correlation tables.\n\nHold three dimensions in front of the investor at once:\n\nScientific — biology is a causal system, but the standard tools study it with correlation lenses.\nFinancial — wrong targets equal failed trials equal destroyed capital.\nRegulatory — the FDA is raising the bar, and most platforms aren't built to clear it.",

      "body": "BiRAGAS reasons about cause and effect, not just statistical association. The platform integrates four convergent biological streams — transcriptomics, GWAS with Mendelian randomization, CRISPR perturbation, and curated knowledge — into one unified causal graph.\n\nEvery output ships with a Causal Confidence Score: Tier 1 Driver, Tier 2 Strong Candidate, Tier 3 Candidate. And every claim is backed by a source-linked, FDA-aligned evidence dossier. The right target stops being an inference and becomes a defensible, auditable result.\n\nThe wedge in the room is short and concrete: we make the causal claim, with evidence, that nobody else can make at scale.",

      "body": "BiRAGAS is unreplicable — not because of any single module, but because of how the modules are wired together at the foundation.\n\nThe AI-drug-discovery market is crowded — Recursion, Insitro, Owkin, Schrödinger, BenevolentAI. But every major incumbent is correlational at the architecture level. They optimize molecules after a target is chosen. They identify associations between genes and phenotypes. None of them ships a unified causal DAG with Mendelian randomization, CRISPR perturbation, SIGNOR pathway evidence, and causal calculus all converging on one platform.\n\nThat gap is not a feature gap. It is a foundation gap. To match BiRAGAS, a competitor would have to rebuild from the substrate up — replicate four years of architectural decisions, re-derive the integration logic across four convergent evidence streams, and re-build the Causion natural-language layer on top. Even with unlimited engineering budget, the platform cannot be copied in less than three to four years.\n\nLayer in the regulatory tailwind: FDA guidance now explicitly favors mechanistic causal evidence. The platforms architected for correlation are structurally exposed. BiRAGAS was architected for exactly what the FDA is moving toward — by design, not by accident.",

      "body": "A standard Y Combinator post-money SAFE — discount, no valuation cap — with one critical modification: a milestone-gated twelve-month Refund Right rider.\n\nIf BiRAGAS misses defined operating milestones in twelve months, the investor elects a refund of the purchase amount. If we hit them, the SAFE converts at the Series A at a twenty percent discount. Either way, the asymmetry runs in the investor's favor.\n\nThe mechanics:\n\nMinimum check two hundred fifty thousand dollars, waivable. Rolling close through Q3 2027. First close Q3 2026. Most-Favored-Nation and pro-rata rights both included via the Anchor Investor Side Letter.\n\nMilestones — three tiers. Tier 1 corporate hygiene, all three required. Tier 2 commercial pipeline, at least one of four. Tier 3 product/IP/validation, at least one of three. If the threshold isn't met and no Material Adverse Event has occurred, the investor receives a refund within 90 days, subordinated to a 12-month operating reserve.\n\nBiRAGAS PPM Units are fractional beneficial interests in the BiRAGAS Inc. Equity.\n\nThis is the only AI-biotech SAFE on the market that pairs Series A discount with built-in capital protection.",

    "id": "bet",

        "Pivot from why-now into team — the bet on this team executing.",

        "Leave silence after the closing line. Don't qualify it."
      ]

function BiRAGASPlaybook() {
  const [activeSection, setActiveSection] = useState(0);

  const [tab, setTab] = useState("narrative");

                  marginBottom: 3
                }}>
                  {String(i + 1).padStart(2, "0")} / {String(sections.length).padStart(2, "0")}
                </div>
                <div style={{
                  fontSize: 13,
                  color: activeSection === i ? "#F5F0E8" : "#888",
                  fontWeight: activeSection === i ? 600 : 400,
                  letterSpacing: "0.01em"
                }}>
                  {s.label}
                </div>
                <div style={{
                  fontSize: 11,
                  color: activeSection === i ? "#999" : "#555",
                  marginTop: 2,
                  fontStyle: "italic"
                }}>
                  {s.subtitle}
                </div>
              </button>
            ))}
          </div>

          {/* Main content */}
          <div className="main-pad" style={{ flex: 1, padding: "36px 44px", overflowY: "auto", maxWidth: 900 }}>
            <div style={{
              fontSize: 10,
              letterSpacing: "0.25em",
              color: section.color,
              textTransform: "uppercase",
              fontFamily: "monospace",
              marginBottom: 6
            }}>
              {section.label} · {section.subtitle}
            </div>
            <h2 style={{
              fontSize: 30,
              fontWeight: 700,
              color: "#F5F0E8",
              margin: "0 0 22px",
              letterSpacing: "-0.4px",
              lineHeight: 1.2
            }}>
              {section.content.headline}
            </h2>

            <div style={{
              fontSize: 15,
              lineHeight: 1.8,
              color: "#C8C4BC",
              marginBottom: 32,
              whiteSpace: "pre-line"
            }}>
              {section.content.body}
            </div>

            {section.content.tactics && section.content.tactics.length > 0 && (
              <div style={{
                background: "#0F0F0F",
                border: "1px solid #222",
                borderLeft: `3px solid ${section.color}`,
                borderRadius: 4,
                padding: "20px 24px",
                marginBottom: 24
              }}>
                <div style={{
                  fontSize: 10,
                  letterSpacing: "0.25em",
                  color: section.color,
                  textTransform: "uppercase",
                  fontFamily: "monospace",
                  marginBottom: 12
                }}>
                  Pitch Tactics
                </div>
                <ul style={{ margin: 0, paddingLeft: 18, color: "#C8C4BC", fontSize: 14, lineHeight: 1.7 }}>
                  {section.content.tactics.map((t, i) => <li key={i} style={{ marginBottom: 6 }}>{t}</li>)}
                </ul>
              </div>
            )}

            {/* Navigation */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32, paddingTop: 22, borderTop: "1px solid #222" }}>
              <button
                onClick={() => setActiveSection(Math.max(0, activeSection - 1))}
                disabled={activeSection === 0}
                style={{
                  background: "transparent",
                  border: "1px solid #333",
                  color: activeSection === 0 ? "#444" : "#888",
                  padding: "9px 20px",
                  borderRadius: 4,
                  cursor: activeSection === 0 ? "default" : "pointer",
                  fontSize: 12,
                  fontFamily: "monospace",
                  letterSpacing: "0.1em"
                }}
              >
                ← Previous
              </button>
              <button
                onClick={() => setActiveSection(Math.min(sections.length - 1, activeSection + 1))}
                disabled={activeSection === sections.length - 1}
                style={{
                  background: activeSection === sections.length - 1 ? "transparent" : section.color,
                  border: `1px solid ${activeSection === sections.length - 1 ? "#333" : section.color}`,
                  color: activeSection === sections.length - 1 ? "#444" : "#fff",
                  padding: "9px 20px",
                  borderRadius: 4,
                  cursor: activeSection === sections.length - 1 ? "default" : "pointer",
                  fontSize: 12,
                  fontFamily: "monospace",
                  letterSpacing: "0.1em"
                }}
              >
                Next →
              </button>
            </div>
          </div>
        </div>
      ) : (
        <div className="main-pad" style={{ flex: 1, padding: "36px 44px", maxWidth: 900, overflowY: "auto" }}>
          <div style={{ fontSize: 10, letterSpacing: "0.25em", color: "#C8102E", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 8 }}>
            Handling Objections
          </div>
          <h2 style={{ fontSize: 28, fontWeight: 700, color: "#F5F0E8", margin: "0 0 28px", letterSpacing: "-0.3px" }}>
            Every Hard Question. Answered.
          </h2>
          {objections.map((o, i) => (
            <div key={i} style={{
              background: activeObj === i ? "#141414" : "#0F0F0F",
              border: `1px solid ${activeObj === i ? "#C8102E" : "#222"}`,
              borderRadius: 6,
              marginBottom: 12,
              overflow: "hidden",
              transition: "all 0.2s"
            }}>
              <button
                onClick={() => setActiveObj(activeObj === i ? null : i)}
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  width: "100%",
                  background: "transparent",
                  border: "none",
                  padding: "18px 24px",
                  cursor: "pointer",
                  textAlign: "left",
                  gap: 16
                }}
              >
                <div style={{ fontSize: 14, color: activeObj === i ? "#F5F0E8" : "#C8C4BC", fontWeight: 500, lineHeight: 1.4 }}>
                  "{o.q}"
                </div>
                <div style={{
                  color: "#C8102E",
                  fontSize: 18,
                  flexShrink: 0,
                  transform: activeObj === i ? "rotate(45deg)" : "none",
                  transition: "transform 0.2s"
                }}>
                  +
                </div>
              </button>
              {activeObj === i && (
                <div style={{
                  padding: "0 24px 20px",
                  fontSize: 14,
                  color: "#B0A898",
                  lineHeight: 1.75,
                  borderTop: "1px solid #222"
                }}>
                  <div style={{ paddingTop: 16 }}>{o.a}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {drawerOpen && (
        <React.Fragment>
          <div
            className="drawer-backdrop"
            onClick={() => setDrawerOpen(false)}
            style={{
              position: "fixed",
              inset: 0,
              background: "rgba(0,0,0,0.6)",
              zIndex: 998,
              animation: "fadeIn 0.18s ease-out"
            }}
          />
          <div
            className="drawer"
            style={{
              position: "fixed",
              top: 0,
              left: 0,
              bottom: 0,
              width: "82%",
              maxWidth: 320,
              background: "#0F0F0F",
              borderRight: "1px solid #222",
              zIndex: 999,
              flexDirection: "column",
              animation: "drawerIn 0.22s ease-out"
            }}
          >
            <div style={{
              padding: "18px 22px",
              borderBottom: "1px solid #222",
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center"
            }}>
              <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#888", fontFamily: "monospace" }}>
                SECTIONS
              </div>
              <button
                onClick={() => setDrawerOpen(false)}
                aria-label="Close menu"
                style={{
                  background: "transparent",
                  border: "1px solid #333",
                  color: "#C8C4BC",
                  width: 32,
                  height: 32,
                  borderRadius: 4,
                  cursor: "pointer",
                  fontSize: 14,
                  lineHeight: 1
                }}
              >
                ×
              </button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, padding: "10px 0" }}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => { setActiveSection(i); setTab("narrative"); setDrawerOpen(false); }}
                  style={{
                    display: "block",
                    width: "100%",
                    textAlign: "left",
                    background: activeSection === i && tab === "narrative" ? "#1A1A1A" : "transparent",
                    border: "none",
                    borderLeft: `3px solid ${activeSection === i && tab === "narrative" ? s.color : "transparent"}`,
                    padding: "14px 22px",
                    cursor: "pointer"
                  }}
                >
                  <div style={{
                    fontSize: 10,
                    letterSpacing: "0.2em",
                    color: activeSection === i && tab === "narrative" ? s.color : "#555",
                    textTransform: "uppercase",
                    fontFamily: "monospace",
                    marginBottom: 3
                  }}>
                    {String(i + 1).padStart(2, "0")} / {String(sections.length).padStart(2, "0")}
                  </div>
                  <div style={{
                    fontSize: 14,
                    color: activeSection === i && tab === "narrative" ? "#F5F0E8" : "#C8C4BC",
                    fontWeight: activeSection === i && tab === "narrative" ? 600 : 400
                  }}>
                    {s.label}
                  </div>
                  <div style={{
                    fontSize: 11,
                    color: activeSection === i && tab === "narrative" ? "#999" : "#666",
                    marginTop: 2,
                    fontStyle: "italic"
                  }}>
                    {s.subtitle}
                  </div>
                </button>
              ))}
              <div style={{ borderTop: "1px solid #222", margin: "12px 22px" }} />
              <button
                onClick={() => { setTab("objections"); setDrawerOpen(false); }}
                style={{
                  display: "block",
                  width: "100%",
                  textAlign: "left",
                  background: tab === "objections" ? "#1A1A1A" : "transparent",
                  border: "none",
                  borderLeft: `3px solid ${tab === "objections" ? "#C8102E" : "transparent"}`,
                  padding: "14px 22px",
                  cursor: "pointer"
                }}
              >
                <div style={{
                  fontSize: 10,
                  letterSpacing: "0.2em",
                  color: tab === "objections" ? "#C8102E" : "#555",
                  textTransform: "uppercase",
                  fontFamily: "monospace",
                  marginBottom: 3
                }}>
                  Q&A
                </div>
                <div style={{
                  fontSize: 14,
                  color: tab === "objections" ? "#F5F0E8" : "#C8C4BC",
                  fontWeight: tab === "objections" ? 600 : 400
                }}>
                  Objections
                </div>
                <div style={{ fontSize: 11, color: "#666", marginTop: 2, fontStyle: "italic" }}>
                  Every hard question, answered
                </div>
              </button>
            </div>
          </div>
        </React.Fragment>
      )}

      <div className="footer-row" style={{
        borderTop: "1px solid #1A1A1A",
        padding: "12px 40px",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        flexWrap: "wrap",
        gap: 8
      }}>
        <div style={{ fontSize: 11, color: "#444", fontFamily: "monospace" }}>
          BIRAGAS · AYASS BIOSCIENCE, LLC · TEXAS · MMXXVI
        </div>
        <div style={{ fontSize: 11, color: "#444", fontFamily: "monospace" }}>
          FOR DISCUSSION PURPOSES ONLY
        </div>
      </div>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(BiRAGASPlaybook));

const boot = document.getElementById('boot');
if (boot) boot.remove();
</script>
</body>
</html>
